<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clarity HyperFrame Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    [data-composition-id="clarity-preview"] {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      color: rgba(255,255,255,.74);
      font-family: Georgia, 'Times New Roman', serif;
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(14px, 4vw, 54px) clamp(12px, 4.6vw, 70px) clamp(22px, 5vw, 74px);
    }
    .laptop {
      position: relative;
      width: min(78vw, 1120px);
      aspect-ratio: 1.48;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,.72));
    }
    .lid {
      position: absolute;
      left: 8.2%;
      right: 8.2%;
      top: 0;
      bottom: 9.6%;
      border-radius: 28px 28px 8px 8px;
      background: linear-gradient(90deg, #2f3134 0%, #a6a9ad 2.1%, #26292c 3.4%, #101113 4.4%, #101113 95.6%, #2a2d30 96.7%, #aeb1b5 98%, #34373a 100%);
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.09), inset 0 0 0 8px #050505;
      overflow: hidden;
    }
    .screen {
      position: absolute;
      inset: 4.4% 2.4% 2.6%;
      border-radius: 12px 12px 2px 2px;
      overflow: hidden;
      background: #89887d;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      width: 13.5%;
      height: 5.9%;
      transform: translateX(-50%);
      background: #030303;
      border-radius: 0 0 9px 9px;
      z-index: 80;
    }
    .camera {
      position: absolute;
      left: 50%;
      top: 39%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, #203c52 0 22%, #020406 48% 100%);
      opacity: .8;
    }
    .base {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 10.8%;
      border-radius: 6px 6px 30px 30px / 8px 8px 24px 24px;
      background:
        radial-gradient(ellipse at 50% 0, rgba(255,255,255,.55) 0 12%, transparent 31%),
        linear-gradient(180deg, #dedede 0%, #9b9b9b 28%, #676767 72%, #2b2b2b 100%);
      box-shadow: inset 0 7px 12px rgba(255,255,255,.45), inset 0 -7px 12px rgba(0,0,0,.28);
    }
    .base::before {
      content: '';
      position: absolute;
      left: 42%;
      top: 0;
      width: 16%;
      height: 25%;
      border-radius: 0 0 22px 22px;
      background: linear-gradient(180deg, rgba(195,195,195,.92), rgba(232,232,232,.62));
      box-shadow: inset 0 -6px 10px rgba(0,0,0,.12);
    }
    .scene-content {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 26%, rgba(255,235,154,.58) 0 5.5%, transparent 18%),
        linear-gradient(102deg, #d5b982 0%, #b6b49d 28%, #88928e 61%, #7d8681 100%);
    }
    .sun {
      position: absolute;
      left: 13.2%;
      top: 22.2%;
      width: 4.9%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fffcc5;
      box-shadow: 0 0 26px 15px rgba(255,229,151,.42), 0 0 112px 58px rgba(255,215,139,.3);
      z-index: 8;
    }
    .mist {
      position: absolute;
      inset: 0;
      z-index: 18;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,238,190,.34), rgba(218,221,206,.1) 38%, rgba(117,126,124,.22)),
        radial-gradient(ellipse at 26% 34%, rgba(255,247,208,.32), transparent 33%),
        radial-gradient(ellipse at 72% 28%, rgba(150,156,150,.24), transparent 42%);
      mix-blend-mode: screen;
      opacity: .64;
    }
    .cloud {
      position: absolute;
      height: 3.2%;
      border-radius: 999px;
      background: rgba(124,129,121,.16);
      z-index: 7;
    }
    .c1 { left: -7%; top: 25%; width: 19%; }
    .c2 { left: 34%; top: 19%; width: 20%; }
    .c3 { left: 39%; top: 29%; width: 12%; }
    .c4 { left: 75%; top: 23%; width: 10%; }
    .c5 { left: 90%; top: 31%; width: 15%; }
    .mountain {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 124%;
      height: 62%;
      clip-path: polygon(0 72%, 9% 55%, 16% 66%, 29% 40%, 41% 64%, 53% 49%, 61% 62%, 72% 45%, 83% 60%, 95% 43%, 100% 100%, 0 100%);
    }
    .mountain.back { bottom: 13%; background: rgba(176,177,150,.36); z-index: 2; }
    .mountain.mid { bottom: 4%; background: rgba(95,126,119,.55); z-index: 3; transform: translateX(-4%); }
    .mountain.front { bottom: -8%; background: rgba(74,107,104,.72); z-index: 4; transform: translateX(-2%); }
    .hill {
      position: absolute;
      left: 22%;
      bottom: -12%;
      width: 74%;
      height: 33%;
      background:
        linear-gradient(118deg, rgba(255,255,255,.08), transparent 42%),
        rgba(156,146,136,.9);
      border-radius: 50% 50% 0 0 / 74% 74% 0 0;
      z-index: 14;
    }
    .tower {
      position: absolute;
      left: 13.2%;
      bottom: -4.8%;
      width: 11.6%;
      height: 60.8%;
      z-index: 30;
      filter: drop-shadow(0 10px 8px rgba(75,62,48,.15));
    }
    .tower .dome {
      position: absolute;
      left: 13%;
      top: 0;
      width: 74%;
      height: 13%;
      border-radius: 100% 100% 0 0;
      background: linear-gradient(180deg, #ffc59e 0%, #efa374 68%, #dd8c67 100%);
      opacity: .86;
      z-index: 2;
    }
    .tower .body {
      position: absolute;
      left: 5.5%;
      top: 10.8%;
      width: 89%;
      height: 89.2%;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255,238,200,.38) 0 14%, rgba(180,145,105,.14) 14% 22%, rgba(255,239,203,.44) 22% 39%, rgba(159,124,88,.15) 39% 48%, rgba(255,239,203,.33) 48% 63%, rgba(151,117,82,.16) 63% 74%, rgba(255,238,199,.28) 74% 100%),
        #d7b58c;
      box-shadow: inset 4px 0 0 rgba(255,242,209,.28), inset -8px 0 0 rgba(112,84,62,.1);
    }
    .tower .body::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 11.4%;
      height: 2.3%;
      background: rgba(255,241,205,.48);
    }
    .window {
      position: absolute;
      border-radius: 999px 999px 4px 4px;
      background: rgba(111,91,70,.34);
      box-shadow: inset 0 2px 0 rgba(255,235,203,.16);
      z-index: 3;
    }
    .w1, .w2, .w3 { top: 21%; width: 10.2%; height: 8.6%; }
    .w1 { left: 24%; }
    .w2 { left: 45%; }
    .w3 { left: 66%; }
    .w4, .w5, .w6 { top: 48%; width: 5.3%; height: 8%; }
    .w4 { left: 30%; }
    .w5 { left: 48%; }
    .w6 { left: 67%; }
    .forest {
      position: absolute;
      inset: auto -4% 0 -4%;
      height: 63%;
      z-index: 32;
    }
    .tree {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: var(--w) solid transparent;
      border-right: var(--w) solid transparent;
      border-bottom: var(--h) solid var(--c);
      filter: drop-shadow(0 14px 10px rgba(0,0,0,.12));
    }
    .t1 { --w: 4.5vw; --h: 31vh; --c: #162323; left: -2%; }
    .t2 { --w: 1.8vw; --h: 17vh; --c: #314b49; left: 8%; opacity: .88; }
    .t3 { --w: 4.5vw; --h: 33vh; --c: #254344; left: 25%; opacity: .9; }
    .t4 { --w: 3.1vw; --h: 24vh; --c: #142020; left: 30.5%; }
    .t5 { --w: 2.1vw; --h: 18vh; --c: #526a66; left: 47%; opacity: .75; }
    .t6 { --w: 2.7vw; --h: 23vh; --c: #42625f; left: 62%; opacity: .82; }
    .t7 { --w: 4.1vw; --h: 35vh; --c: #17393c; left: 70%; }
    .t8 { --w: 6.1vw; --h: 46vh; --c: #173a3e; left: 79%; }
    .t9 { --w: 3.1vw; --h: 26vh; --c: #102021; left: 86%; }
    .caption {
      position: absolute;
      left: 50%;
      bottom: 6.2%;
      transform: translateX(-50%);
      width: min(74%, 760px);
      text-align: center;
      font-size: clamp(9px, 1.22vw, 18px);
      line-height: 1.35;
      letter-spacing: 0;
      color: rgba(255,255,255,.74);
      text-shadow: 1px 2px 3px rgba(0,0,0,.38);
      z-index: 70;
    }
    .click {
      position: absolute;
      right: 3.9%;
      bottom: 4.2%;
      font-size: clamp(7px, .78vw, 12px);
      color: rgba(255,255,255,.2);
      z-index: 71;
      white-space: nowrap;
    }
    .screen-vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.12)),
        radial-gradient(circle at 22% 25%, transparent 0 30%, rgba(0,0,0,.18) 100%);
      z-index: 90;
      pointer-events: none;
    }
    @media (max-aspect-ratio: 1/1) {
      .stage { padding: 8vw 3vw; }
      .laptop { width: 96vw; }
      .caption { font-size: 10px; bottom: 7%; width: 86%; }
      .click { display: none; }
    }
  </style>
</head>
<body>
  <div data-composition-id="clarity-preview" data-width="1512" data-height="982" data-duration="8" data-start="0" data-track-index="0">
    <div class="stage">
      <div class="laptop">
        <div class="lid">
          <div class="screen">
            <div class="scene-content">
              <div class="sun"></div>
              <span class="cloud c1"></span><span class="cloud c2"></span><span class="cloud c3"></span><span class="cloud c4"></span><span class="cloud c5"></span>
              <div class="mountain back"></div>
              <div class="mountain mid"></div>
              <div class="mountain front"></div>
              <div class="hill"></div>
              <div class="tower">
                <div class="dome"></div>
                <div class="body">
                  <span class="window w1"></span><span class="window w2"></span><span class="window w3"></span>
                  <span class="window w4"></span><span class="window w5"></span><span class="window w6"></span>
                </div>
              </div>
              <div class="forest">
                <span class="tree t1"></span><span class="tree t2"></span><span class="tree t3"></span>
                <span class="tree t4"></span><span class="tree t5"></span><span class="tree t6"></span>
                <span class="tree t7"></span><span class="tree t8"></span><span class="tree t9"></span>
              </div>
              <div class="mist"></div>
              <div class="caption">You love it here. The nature, the architecture, the history, the professors.<br>It all makes you so grateful.</div>
              <div class="click">click anywhere to begin.</div>
              <div class="screen-vignette"></div>
            </div>
          </div>
          <div class="notch"><span class="camera"></span></div>
        </div>
        <div class="base"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from('.laptop', { y: 34, opacity: 0, scale: 0.96, duration: 0.7, ease: 'power3.out' }, 0)
        .from('.sun', { opacity: 0, scale: 0.82, duration: 0.8, ease: 'sine.out' }, 0.18)
        .from('.mountain.back', { y: 30, opacity: 0, duration: 0.9, ease: 'power2.out' }, 0.2)
        .from('.mountain.mid', { y: 38, opacity: 0, duration: 0.9, ease: 'power3.out' }, 0.32)
        .from('.mountain.front', { y: 48, opacity: 0, duration: 0.95, ease: 'expo.out' }, 0.44)
        .from('.hill', { y: 46, opacity: 0, duration: 0.8, ease: 'power3.out' }, 0.52)
        .from('.tower', { y: 48, opacity: 0, duration: 0.85, ease: 'back.out(1.1)' }, 0.6)
        .from('.forest .tree', { y: 58, opacity: 0, stagger: 0.055, duration: 0.62, ease: 'power4.out' }, 0.72)
        .from('.caption', { y: 10, opacity: 0, duration: 0.72, ease: 'sine.out' }, 1.08)
        .from('.click', { opacity: 0, y: 5, duration: 0.58, ease: 'power2.out' }, 1.32)
        .to('.cloud', { x: -18, duration: 6.2, ease: 'none' }, 1.35)
        .to('.mountain.back', { x: -10, duration: 6.2, ease: 'none' }, 1.35)
        .to('.mountain.mid', { x: -17, duration: 6.2, ease: 'none' }, 1.35)
        .to('.mountain.front', { x: -24, duration: 6.2, ease: 'none' }, 1.35)
        .to('.forest', { x: -31, duration: 6.2, ease: 'none' }, 1.35)
        .to('.sun', { scale: 1.07, duration: 3.1, repeat: 1, yoyo: true, ease: 'sine.inOut' }, 1.4)
        .to('.mist', { opacity: 0.78, duration: 3.1, repeat: 1, yoyo: true, ease: 'sine.inOut' }, 1.4)
        .to('.click', { opacity: 0.42, duration: 0.9, repeat: 5, yoyo: true, ease: 'sine.inOut' }, 1.7);
      window.__timelines['clarity-preview'] = tl;
      if (!window.__hyperframes) {
        tl.eventCallback('onComplete', () => tl.restart());
        tl.play(0);
      }
    </script>
  </div>
</body>
</html>
