<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clarity HyperFrame Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #888077; }
    [data-composition-id="clarity-preview"] {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #888077;
      color: rgba(255,255,255,.72);
      font-family: Georgia, 'Times New Roman', serif;
    }
    .scene-content {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(105deg, #d7b98d 0%, #9ca292 32%, #7f8882 100%);
    }
    .sun {
      position: absolute;
      left: 12.8%;
      top: 17.5%;
      width: 4.4vw;
      min-width: 32px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fff7b7;
      box-shadow: 0 0 32px 18px rgba(255,225,142,.38), 0 0 120px 58px rgba(255,214,143,.26);
      z-index: 7;
    }
    .clouds {
      position: absolute;
      inset: -8% -4% auto -8%;
      height: 38%;
      opacity: .12;
      background:
        radial-gradient(ellipse at 10% 68%, rgba(255,255,255,.5) 0 7%, transparent 8%),
        radial-gradient(ellipse at 44% 52%, rgba(255,255,255,.45) 0 9%, transparent 10%),
        radial-gradient(ellipse at 72% 60%, rgba(255,255,255,.5) 0 8%, transparent 9%),
        radial-gradient(ellipse at 92% 66%, rgba(255,255,255,.45) 0 7%, transparent 8%);
      z-index: 8;
    }
    .mountain {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 120%;
      height: 68%;
      clip-path: polygon(0 75%, 8% 60%, 18% 72%, 30% 42%, 39% 62%, 52% 38%, 64% 62%, 75% 43%, 86% 61%, 98% 42%, 100% 100%, 0 100%);
    }
    .mountain.back { background: rgba(164,171,151,.34); bottom: 12%; z-index: 2; transform: translateX(-4%); }
    .mountain.mid { background: rgba(96,128,120,.58); bottom: 2%; z-index: 3; transform: translateX(-1%); }
    .mountain.front { background: rgba(73,111,108,.7); bottom: -10%; z-index: 4; transform: translateX(-5%); }
    .hill {
      position: absolute;
      left: 18%;
      bottom: -8%;
      width: 76%;
      height: 32%;
      background: rgba(162,148,136,.85);
      border-radius: 50% 50% 0 0 / 72% 72% 0 0;
      z-index: 10;
    }
    .tower {
      position: absolute;
      left: 11.5%;
      bottom: -3%;
      width: 11.4%;
      height: 58%;
      z-index: 16;
      filter: drop-shadow(0 10px 12px rgba(61,53,43,.16));
    }
    .tower .dome {
      position: absolute;
      left: 17%;
      top: 0;
      width: 66%;
      height: 17%;
      border-radius: 100% 100% 0 0;
      background: linear-gradient(180deg, #ffad7c, #e88966);
    }
    .tower .body {
      position: absolute;
      left: 7%;
      top: 13%;
      width: 86%;
      height: 87%;
      border-radius: 8px 8px 0 0;
      background: linear-gradient(90deg, #e6ca9f 0 18%, #d5b38e 19% 32%, #e0c19a 33% 50%, #c9a887 51% 66%, #dfbf96 67% 100%);
    }
    .window {
      position: absolute;
      width: 11%;
      height: 11%;
      border-radius: 10px 10px 3px 3px;
      background: rgba(95,79,59,.36);
      z-index: 2;
    }
    .w1 { left: 25%; top: 23%; }
    .w2 { left: 46%; top: 23%; }
    .w3 { left: 68%; top: 23%; }
    .w4 { left: 28%; top: 47%; height: 9%; }
    .w5 { left: 49%; top: 47%; height: 9%; }
    .w6 { left: 70%; top: 47%; height: 9%; }
    .forest {
      position: absolute;
      inset: auto -4% -1% -4%;
      height: 62%;
      z-index: 20;
    }
    .tree {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: var(--w) solid transparent;
      border-right: var(--w) solid transparent;
      border-bottom: var(--h) solid var(--c);
      filter: drop-shadow(0 14px 10px rgba(0,0,0,.12));
    }
    .t1 { --w: 4.6vw; --h: 33vh; --c: #172223; left: -1%; }
    .t2 { --w: 5.2vw; --h: 38vh; --c: #193436; left: 25%; }
    .t3 { --w: 3.4vw; --h: 26vh; --c: #152224; left: 62%; }
    .t4 { --w: 6.5vw; --h: 50vh; --c: #183c40; left: 69%; }
    .t5 { --w: 5.1vw; --h: 43vh; --c: #193f42; left: 86%; }
    .t6 { --w: 4.7vw; --h: 35vh; --c: #172424; left: 94%; }
    .caption {
      position: absolute;
      left: 50%;
      bottom: 10.5%;
      transform: translateX(-50%);
      width: min(78%, 840px);
      text-align: center;
      font-size: clamp(13px, 2.1vw, 26px);
      line-height: 1.35;
      text-shadow: 1px 2px 3px rgba(0,0,0,.25);
      z-index: 30;
    }
    .click {
      position: absolute;
      right: 4.2%;
      bottom: 5.2%;
      font-size: clamp(11px, 1.8vw, 24px);
      color: rgba(255,255,255,.23);
      z-index: 31;
      white-space: nowrap;
    }
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 26% 22%, transparent 0 30%, rgba(0,0,0,.10) 100%);
      z-index: 40;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div data-composition-id="clarity-preview" data-width="1512" data-height="982" data-duration="8" data-start="0" data-track-index="0">
    <div class="scene-content">
      <div class="sun"></div>
      <div class="clouds"></div>
      <div class="mountain back"></div>
      <div class="mountain mid"></div>
      <div class="mountain front"></div>
      <div class="hill"></div>
      <div class="tower">
        <div class="dome"></div>
        <div class="body">
          <span class="window w1"></span><span class="window w2"></span><span class="window w3"></span>
          <span class="window w4"></span><span class="window w5"></span><span class="window w6"></span>
        </div>
      </div>
      <div class="forest">
        <span class="tree t1"></span><span class="tree t2"></span><span class="tree t3"></span>
        <span class="tree t4"></span><span class="tree t5"></span><span class="tree t6"></span>
      </div>
      <div class="caption">You love it here. The nature, the architecture, the history, the professors.</div>
      <div class="click">click anywhere to begin.</div>
      <div class="vignette"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from('.sun', { opacity: 0, scale: 0.86, duration: 0.8, ease: 'sine.out' }, 0.18)
        .from('.mountain.back', { y: 36, opacity: 0, duration: 0.9, ease: 'power2.out' }, 0.22)
        .from('.mountain.mid', { y: 42, opacity: 0, duration: 0.9, ease: 'power3.out' }, 0.34)
        .from('.mountain.front', { y: 54, opacity: 0, duration: 0.95, ease: 'expo.out' }, 0.46)
        .from('.tower', { y: 58, opacity: 0, duration: 0.85, ease: 'back.out(1.2)' }, 0.58)
        .from('.forest .tree', { y: 74, opacity: 0, stagger: 0.08, duration: 0.65, ease: 'power4.out' }, 0.72)
        .from('.caption', { y: 16, opacity: 0, duration: 0.75, ease: 'sine.out' }, 1.05)
        .from('.click', { opacity: 0, y: 8, duration: 0.6, ease: 'power2.out' }, 1.32)
        .to('.mountain.back', { x: -16, duration: 6.2, ease: 'none' }, 1.4)
        .to('.mountain.mid', { x: -24, duration: 6.2, ease: 'none' }, 1.4)
        .to('.mountain.front', { x: -34, duration: 6.2, ease: 'none' }, 1.4)
        .to('.forest', { x: -44, duration: 6.2, ease: 'none' }, 1.4)
        .to('.sun', { scale: 1.08, duration: 3.1, repeat: 1, yoyo: true, ease: 'sine.inOut' }, 1.4)
        .to('.click', { opacity: 0.42, duration: 0.9, repeat: 5, yoyo: true, ease: 'sine.inOut' }, 1.7);
      window.__timelines['clarity-preview'] = tl;
      if (!window.__hyperframes) tl.play(0);
    </script>
  </div>
</body>
</html>
